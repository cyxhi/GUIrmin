<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MRH-G2Ray Admin GUI</title>

<style>

:root{
  color-scheme:dark;

  --bg1:#0f0820;
  --bg2:#1a1038;

  --card:rgba(20,18,40,.72);

  --border:rgba(168,85,247,.25);

  --purple:#a855f7;
  --purple2:#c084fc;

  --text:#f5f3ff;
  --muted:#b8a9d9;

  --input:rgba(10,10,20,.7);
}

*{
  box-sizing:border-box;
}

body{
  font-family:Inter,sans-serif;
  margin:0;
  min-height:100vh;
  padding:2rem;

  color:var(--text);

  background:
    radial-gradient(circle at top left,rgba(168,85,247,.15),transparent 30%),
    radial-gradient(circle at bottom right,rgba(192,132,252,.15),transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));

  background-size:200% 200%;

  animation:bgMove 12s ease infinite;

  overflow-x:hidden;
}

@keyframes bgMove{
  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

.box{
  position:relative;

  max-width:950px;

  margin:0 auto;

  padding:1.5rem;

  border-radius:24px;

  background:var(--card);

  backdrop-filter:blur(18px);

  border:1px solid var(--border);

  box-shadow:
    0 0 30px rgba(168,85,247,.12),
    0 10px 40px rgba(0,0,0,.4);

  animation:fadeIn .8s ease;
}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(18px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.box::before{
  content:"";

  position:absolute;

  inset:-1px;

  border-radius:24px;

  padding:1px;

  background:
    linear-gradient(
      135deg,
      rgba(168,85,247,.5),
      rgba(192,132,252,.1)
    );

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;

  pointer-events:none;
}

.box-header{
  display:flex;

  align-items:flex-start;

  justify-content:space-between;

  gap:.75rem;
}

.box-header h1{
  margin:0;

  font-size:2rem;

  font-weight:800;

  background:
    linear-gradient(
      90deg,
      #ffffff,
      #d8b4fe
    );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

#langBtn{
  margin-top:0;

  padding:.6rem .8rem;

  font-size:1.1rem;

  background:rgba(255,255,255,.05);

  border:1px solid rgba(168,85,247,.35);

  border-radius:14px;

  color:white;

  cursor:pointer;

  transition:all .25s ease;
}

#langBtn:hover{
  transform:
    translateY(-2px)
    scale(1.04);

  background:rgba(168,85,247,.15);

  box-shadow:
    0 0 15px rgba(168,85,247,.4);
}

.muted{
  color:var(--muted);

  font-size:.95rem;
}

label{
  display:block;

  margin-top:1rem;
  margin-bottom:.3rem;

  font-size:.95rem;

  font-weight:700;

  color:#e9d5ff;
}

input{
  width:100%;

  padding:.85rem 1rem;

  border-radius:14px;

  border:1px solid rgba(168,85,247,.2);

  background:var(--input);

  color:white;

  font-size:.95rem;

  transition:all .25s ease;
}

input:focus{
  outline:none;

  border-color:var(--purple2);

  box-shadow:
    0 0 0 4px rgba(168,85,247,.12),
    0 0 20px rgba(168,85,247,.2);

  transform:translateY(-1px);
}

.row-inputs{
  display:flex;

  gap:.75rem;
}

.row-inputs input{
  flex:1;
}

.row-inputs input.port{
  flex:0 0 7rem;
}

button{
  margin-top:1rem;

  padding:.85rem 1rem;

  border:0;

  border-radius:14px;

  cursor:pointer;

  background:
    linear-gradient(
      135deg,
      var(--purple),
      var(--purple2)
    );

  color:white;

  font-weight:700;

  transition:all .25s ease;

  position:relative;

  overflow:hidden;
}

button::before{
  content:"";

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      120deg,
      transparent,
      rgba(255,255,255,.25),
      transparent
    );

  transform:translateX(-100%);
}

button:hover::before{
  animation:shine .9s ease;
}

@keyframes shine{
  to{
    transform:translateX(100%);
  }
}

button:hover{
  transform:translateY(-2px);

  box-shadow:
    0 10px 25px rgba(168,85,247,.35);
}

button:active{
  transform:scale(.98);
}

pre{
  flex:1;

  width:100%;

  min-width:0;

  overflow-x:auto;

  padding:.9rem;

  border-radius:14px;

  border:1px solid rgba(168,85,247,.15);

  background:rgba(5,5,15,.65);

  color:#ddd6fe;

  white-space:pre-wrap;

  word-break:break-word;
}

.configs{
  margin-top:1.25rem;

  display:grid;

  gap:1rem;
}

.config-item{
  border-radius:18px;

  padding:1rem;

  background:rgba(8,8,20,.55);

  border:1px solid rgba(168,85,247,.18);

  transition:all .25s ease;
}

.config-item:hover{
  transform:translateY(-3px);

  border-color:rgba(192,132,252,.45);

  box-shadow:
    0 10px 30px rgba(168,85,247,.15);
}

.config-item .row{
  display:flex;

  gap:.75rem;

  align-items:stretch;

  width:100%;
}

.config-item strong{
  display:block;

  margin-bottom:.75rem;

  color:#f3e8ff;

  font-size:1rem;
}

.config-item button{
  margin-top:0;

  white-space:nowrap;

  min-width:95px;

  height:100%;

  align-self:stretch;
}

.section-divider{
  border:0;

  border-top:1px solid rgba(168,85,247,.18);

  margin:1.5rem 0 .75rem;
}

.section-title{
  font-size:.82rem;

  font-weight:800;

  text-transform:uppercase;

  letter-spacing:.08em;

  color:#c084fc;

  margin:0 0 .35rem;
}

@media(max-width:720px){

  body{
    padding:1rem;
  }

  .row-inputs,
  .config-item .row{
    flex-direction:column;
  }

  .config-item button{
    width:100%;
  }

  .box-header h1{
    font-size:1.6rem;
  }
}

</style>
</head>

<body>

<div class="box">

  <div class="box-header">
    <h1 id="pageTitle">MRH-G2Ray Admin GUI</h1>

    <button id="langBtn" type="button">
      🌐
    </button>
  </div>

  <p class="muted" id="pageSubtitle">
    Premium Purple Edition
  </p>

  <label for="uuid">
    UUID
  </label>

  <input id="uuid" value="">

  <label for="path">
    Path
  </label>

  <input id="path" value="/">

  <label for="remark">
    Remark
  </label>

  <input id="remark" value="ghtun">

  <hr class="section-divider">

  <p class="section-title">
    Custom Endpoint
  </p>

  <p class="muted">
    Optional custom IP / Hostname
  </p>

  <div class="row-inputs">

    <div style="flex:1">

      <label for="customIp" style="margin-top:0">
        Custom IP / Hostname
      </label>

      <input id="customIp">

    </div>

    <div>

      <label for="customPort" style="margin-top:0">
        Port
      </label>

      <input
        id="customPort"
        class="port"
        placeholder="443"
        value="443"
      >

    </div>

  </div>

  <button id="copyAllBtn">
    Copy All Configs
  </button>

  <div id="configs" class="configs"></div>

</div>

<script>

const STATIC_IPS = [
  "63.141.252.203",
  "50.7.5.83",
  "94.130.50.12"
];

let serverIp = "";

const uuidEl = document.getElementById("uuid");
const pathEl = document.getElementById("path");
const remarkEl = document.getElementById("remark");

const customIpEl = document.getElementById("customIp");
const customPortEl = document.getElementById("customPort");

const configsEl = document.getElementById("configs");

const copyAllBtn = document.getElementById("copyAllBtn");

function extractCodespaceName(hostname){

  const match =
    hostname.match(/^(.*)-\d+\.app\.github\.dev$/);

  return match ? match[1] : "";
}

function buildLink(endpoint,port,sniEndpoint){

  const uuid =
    encodeURIComponent(uuidEl.value.trim());

  const path =
    encodeURIComponent(pathEl.value.trim() || "/");

  const remark =
    encodeURIComponent(remarkEl.value.trim() || "ghtun");

  return `vless://${uuid}@${endpoint}:${port}?encryption=none&security=tls&type=xhttp&mode=packet-up&sni=${encodeURIComponent(sniEndpoint)}&path=${path}#${remark}`;
}

function getConfigs(){

  const name =
    extractCodespaceName(window.location.hostname);

  const domain = name
    ? `${name}-443.app.github.dev`
    : "YOUR-CODESPACE-NAME-443.app.github.dev";

  const configs = [

    {
      label:"Domain",
      host:domain,
      link:buildLink(domain,443,domain)
    },

    ...STATIC_IPS.map((ip)=>({

      label:`IP ${ip}`,

      host:ip,

      link:buildLink(ip,443,domain)

    }))
  ];

  if(serverIp){

    configs.push({

      label:`Server IP ${serverIp}`,

      host:serverIp,

      link:buildLink(serverIp,443,domain)
    });
  }

  const customIp =
    customIpEl.value.trim();

  const parsedPort =
    parseInt(customPortEl.value.trim(),10);

  const customPort =
    (parsedPort >= 1 && parsedPort <= 65535)
      ? parsedPort
      : 443;

  if(customIp){

    configs.push({

      label:`Custom ${customIp}:${customPort}`,

      host:customIp,

      link:buildLink(customIp,customPort,domain)
    });
  }

  return configs;
}

async function copyText(text,button,idleLabel){

  try{

    await navigator.clipboard.writeText(text);

    button.textContent = "Copied!";

  }catch(error){

    button.textContent = "Copy failed";
  }

  setTimeout(()=>{

    button.textContent = idleLabel;

  },1200);
}

function render(){

  configsEl.innerHTML = "";

  for(const config of getConfigs()){

    const item =
      document.createElement("div");

    item.className = "config-item";

    const title =
      document.createElement("strong");

    title.textContent =
      `${config.label} (${config.host})`;

    const row =
      document.createElement("div");

    row.className = "row";

    const pre =
      document.createElement("pre");

    pre.textContent = config.link;

    const button =
      document.createElement("button");

    button.type = "button";

    button.textContent = "Copy";

    button.addEventListener("click",()=>{

      copyText(config.link,button,"Copy");

    });

    row.appendChild(pre);

    row.appendChild(button);

    item.appendChild(title);

    item.appendChild(row);

    item.style.opacity = "0";
    item.style.transform = "translateY(10px)";

    configsEl.appendChild(item);

    requestAnimationFrame(()=>{

      item.style.transition = "all .35s ease";

      item.style.opacity = "1";

      item.style.transform = "translateY(0)";
    });
  }
}

[
  uuidEl,
  pathEl,
  remarkEl,
  customIpEl,
  customPortEl
].forEach((el)=>{

  el.addEventListener("input",render);

});

copyAllBtn.addEventListener("click",()=>{

  const allConfigs =
    getConfigs()
      .map((config)=>config.link)
      .join("\n");

  copyText(
    allConfigs,
    copyAllBtn,
    "Copy All Configs"
  );
});

async function preloadInfo(){

  try{

    const res =
      await fetch(
        "xray-info.json",
        {
          cache:"no-store"
        }
      );

    const info =
      await res.json();

    if(info.uuid)
      uuidEl.value = info.uuid;

    if(info.path)
      pathEl.value = info.path;

    if(info.remark)
      remarkEl.value = info.remark;

    if(info.server_ip)
      serverIp = info.server_ip;

  }catch(error){

    console.warn(error);
  }

  render();
}

preloadInfo();

</script>

</body>
</html>
